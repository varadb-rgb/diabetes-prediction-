<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Diabetes Prediction</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; background: #f5f5f5; color: #333; }
    h1 { font-size: 24px; margin-bottom: 6px; }
    p.sub { color: #888; font-size: 14px; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; outline: none; box-sizing: border-box; }
    input:focus { border-color: #4a90e2; }
    button { width: 100%; padding: 12px; background: #4a90e2; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    button:hover { background: #357abd; }
    .result { margin-top: 24px; padding: 16px; border-radius: 8px; font-size: 15px; background: #eaf6ff; border: 1px solid #aad4f5; }
  </style>
</head>
<body>

  <h1>Diabetes Prediction</h1>
  <p class="sub">Enter your health details below to get a prediction.</p>

  <form method="POST" action="/predict">
    <div class="form-group">
      <label>Pregnancies</label>
      <input type="number" name="Pregnancies" placeholder="e.g. 2" min="0" required/>
    </div>
    <div class="form-group">
      <label>Glucose (mg/dL)</label>
      <input type="number" name="Glucose" placeholder="e.g. 120" min="0" required/>
    </div>
    <div class="form-group">
      <label>Blood Pressure (mm Hg)</label>
      <input type="number" name="BloodPressure" placeholder="e.g. 72" min="0" required/>
    </div>
    <div class="form-group">
      <label>Skin Thickness (mm)</label>
      <input type="number" name="SkinThickness" placeholder="e.g. 20" min="0" required/>
    </div>
    <div class="form-group">
      <label>Insulin (μU/mL)</label>
      <input type="number" name="Insulin" placeholder="e.g. 85" min="0" required/>
    </div>
    <div class="form-group">
      <label>BMI</label>
      <input type="number" name="BMI" placeholder="e.g. 28.5" step="0.1" min="0" required/>
    </div>
    <div class="form-group">
      <label>Diabetes Pedigree Function</label>
      <input type="number" name="DiabetesPedigreeFunction" placeholder="e.g. 0.47" step="0.001" min="0" required/>
    </div>
    <div class="form-group">
      <label>Age</label>
      <input type="number" name="Age" placeholder="e.g. 33" min="1" required/>
    </div>

    <button type="submit">Predict</button>
  </form>

  {% if prediction_text %}
    <div class="result">{{ prediction_text }}</div>
  {% endif %}

</body>
</html>
